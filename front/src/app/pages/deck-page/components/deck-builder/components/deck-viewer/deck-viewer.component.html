<div class="deck-viewer">
  <section class="deck-viewer__zone deck-viewer__zone--main">
    <header class="deck-viewer__zone-header">
      <span class="deck-viewer__zone-title">{{ 'deckBuilder.viewer.main' | translate }}</span>
      <span class="pill" [class.pill--valid]="mainPillVariant() === 'valid'" [class.pill--invalid]="mainPillVariant() === 'invalid'">
        {{ deckBuildService.mainCardNumber() }} / 60
      </span>
    </header>
    <deck-card-zone
      [cardDetails]="deckBuildService.deck().mainDeck"
      [deckZone]="deckZone.MAIN"
      (cardClicked)="cardClicked.emit($event)"></deck-card-zone>
  </section>

  <section class="deck-viewer__zone deck-viewer__zone--extra">
    <header class="deck-viewer__zone-header">
      <span class="deck-viewer__zone-title">{{ 'deckBuilder.viewer.extra' | translate }}</span>
      <span class="pill" [class.pill--valid]="extraPillVariant() === 'valid'" [class.pill--invalid]="extraPillVariant() === 'invalid'">
        {{ deckBuildService.extraCardNumber() }} / 15
      </span>
    </header>
    <deck-card-zone
      [cardDetails]="deckBuildService.deck().extraDeck"
      [deckZone]="deckZone.EXTRA"
      [slotNumber]="15"
      (cardClicked)="cardClicked.emit($event)"></deck-card-zone>
  </section>

  <section class="deck-viewer__zone deck-viewer__zone--side">
    <header class="deck-viewer__zone-header">
      <span class="deck-viewer__zone-title">{{ 'deckBuilder.viewer.side' | translate }}</span>
      <span class="pill" [class.pill--valid]="sidePillVariant() === 'valid'" [class.pill--invalid]="sidePillVariant() === 'invalid'">
        {{ deckBuildService.sideCardNumber() }} / 15
      </span>
    </header>
    <deck-card-zone
      [cardDetails]="deckBuildService.deck().sideDeck"
      [deckZone]="deckZone.SIDE"
      [slotNumber]="15"
      (cardClicked)="cardClicked.emit($event)"></deck-card-zone>
  </section>
</div>
