@if (deckBuildService.decks$ | async; as decks) {
  @if (decks.length > 0) {
    <div class="deckPage">
      <deck-box class="deckPage-deck" [add]="true"></deck-box>
      @for (deck of decks; track deck.id) {
        <div class="deckPage-deck">
          <deck-box [deck]="deck"></deck-box>
          <button
            mat-icon-button
            class="deckPage-deck-solve"
            [attr.aria-label]="('a11y.solveDeck' | translate:{name: deck.name})"
            [matTooltip]="'solver.pageTitle' | translate"
            [disabled]="!deck.id"
            (click)="openSolver(deck); $event.stopPropagation()">
            <mat-icon fontIcon="psychology"></mat-icon>
          </button>
          <button
            mat-icon-button
            class="deckPage-deck-remove"
            [attr.aria-label]="('a11y.deleteDeck' | translate:{name: deck.name})"
            (click)="confirmDelete(deck); $event.stopPropagation()">
            <mat-icon fontIcon="delete"></mat-icon>
          </button>
        </div>
      }
    </div>
  } @else {
    <app-empty-state [message]="'deckList.empty' | translate" [ctaLabel]="'deckList.createDeck' | translate" ctaLink="/decks/builder"></app-empty-state>
  }
}
