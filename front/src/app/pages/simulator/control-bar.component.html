<!-- Desktop: always-visible bar -->
@if (!isMobile()) {
  <div class="control-bar" role="toolbar" aria-label="Session controls">
    <button mat-icon-button
            [attr.aria-label]="'common.back' | translate"
            [matTooltip]="'common.back' | translate"
            (click)="onBack()">
      <mat-icon>arrow_back</mat-icon>
    </button>

    <div class="separator"></div>

    <button mat-icon-button
            [disabled]="!canUndo()"
            [attr.aria-disabled]="!canUndo()"
            [attr.aria-label]="'simulator.undo' | translate"
            [matTooltip]="'simulator.undo' | translate"
            (click)="onUndo()">
      <mat-icon>undo</mat-icon>
    </button>

    <button mat-icon-button
            [disabled]="!canRedo()"
            [attr.aria-disabled]="!canRedo()"
            [attr.aria-label]="'simulator.redo' | translate"
            [matTooltip]="'simulator.redo' | translate"
            (click)="onRedo()">
      <mat-icon>redo</mat-icon>
    </button>

    <div class="separator"></div>

    <button mat-icon-button
            [attr.aria-label]="'simulator.reset' | translate"
            [matTooltip]="'simulator.reset' | translate"
            (click)="onReset()">
      <mat-icon>refresh</mat-icon>
    </button>

    @if (isDevMode) {
      <div class="separator"></div>
      <span class="debug-info">U:{{ undoCount() }} R:{{ redoCount() }}</span>
    }
  </div>
}

<!-- Mobile: collapsible FAB -->
@if (isMobile()) {
  <div class="fab-actions" [class.open]="isExpanded()" role="toolbar" aria-label="Session controls">
    <button mat-icon-button class="fab-action" [attr.aria-label]="'common.back' | translate" (click)="onBack()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <button mat-icon-button class="fab-action" [attr.aria-label]="'simulator.reset' | translate" (click)="onReset()">
      <mat-icon>refresh</mat-icon>
    </button>
    <button mat-icon-button class="fab-action" [disabled]="!canRedo()" [attr.aria-label]="'simulator.redo' | translate" (click)="onRedo()">
      <mat-icon>redo</mat-icon>
    </button>
    <button mat-icon-button class="fab-action" [disabled]="!canUndo()" [attr.aria-label]="'simulator.undo' | translate" (click)="onUndo()">
      <mat-icon>undo</mat-icon>
    </button>
  </div>

  <button mat-mini-fab class="fab-trigger" [class.open]="isExpanded()" aria-label="Actions" (click)="toggleExpand()">
    <mat-icon>{{ isExpanded() ? 'close' : 'more_vert' }}</mat-icon>
  </button>
}
