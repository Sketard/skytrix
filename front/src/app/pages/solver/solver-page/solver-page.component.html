@if (!isDesktop()) {
  <div class="solver-desktop-only">
    <p>{{ 'solver.desktopRequired' | translate }}</p>
    <a mat-button routerLink="/decks">{{ 'solver.backToDecks' | translate }}</a>
  </div>
} @else {
  <div class="solver-layout">
    <div class="solver-config" [class.collapsed]="collapsed()">
      @if (solverState() === 'loading') {
        <mat-spinner diameter="40"></mat-spinner>
      }
      @if (deck(); as d) {
        <app-solver-config
          [deck]="d"
          [solverState]="solverState()"
          (solve)="onSolve($event)" />
      }
    </div>

    @if (collapsed()) {
      <div class="solver-collapsed-bar">
        <button mat-icon-button
          [attr.aria-label]="'solver.uncollapse' | translate"
          (click)="uncollapse()">
          <mat-icon fontIcon="tune"></mat-icon>
        </button>
      </div>
    }

    <div class="solver-result">
      @if (solverState() === 'running') {
        <app-solver-progress
          [progress]="solverService.progress()"
          (cancel)="onCancel()" />
      }
      <!-- Result components go here (Story 1.6a) -->
    </div>
  </div>
}
