@if (visible()) {
  <div class="zone-browser"
       [class.zone-browser--expanded]="expanded()"
       [class.zone-browser--closing]="isClosing()"
       role="dialog"
       [attr.aria-label]="zoneId() + ' browser'"
       (keydown)="onKeydown($event)">

    <button class="zone-browser__expand-tab"
            type="button"
            (click)="toggleExpanded($event)"
            [attr.aria-label]="expanded() ? 'Collapse' : 'Expand'">
      {{ expanded() ? '⊟' : '⊞' }}
    </button>

    <div class="zone-browser__header">
      <span class="zone-browser__title">{{ zoneLabel }} ({{ cards().length }})</span>
    </div>

    @if (isOpponentExtra()) {
      <div class="zone-browser__facedown-count">
        {{ cards().length }} cards
      </div>
    } @else {
      <div class="zone-browser__grid">
        @for (card of cards(); track $index) {
          <button class="zone-browser__card"
                  type="button"
                  (click)="onCardClick(card)">
            <img [src]="getCardImageUrlByCode(card.cardCode ?? 0)"
                 [alt]="card.name ?? 'Card'"
                 class="zone-browser__card-art"
                 (error)="$any($event.target).src='assets/images/card_back.jpg'">
          </button>
        }
        @if (cards().length === 0) {
          <div class="zone-browser__empty">Empty</div>
        }
      </div>
    }

  </div>
}
