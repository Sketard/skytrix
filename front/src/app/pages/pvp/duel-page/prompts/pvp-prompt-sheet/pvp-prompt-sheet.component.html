<div class="prompt-sheet"
     [class.prompt-sheet--visible]="isSheetVisible()"
     [class.prompt-sheet--collapsed]="sheetState() === 'collapsed'"
     [class.prompt-sheet--transitioning]="sheetState() === 'transitioning'"
     [cdkTrapFocus]="trapFocusActive()"
     [cdkTrapFocusAutoCapture]="true"
     role="dialog"
     aria-modal="true"
     aria-label="Game prompt">

  <button class="collapse-handle"
          (click)="toggleCollapse()"
          aria-label="Toggle prompt collapse"
          type="button">
    <span class="collapse-arrow"
          [class.collapse-arrow--up]="sheetState() === 'collapsed'">&#x25BC;</span>
  </button>

  @if (hintText() && sheetState() !== 'collapsed') {
    <div class="hint-header"
         [class.hint-header--flash]="sheetState() === 'transitioning'">
      {{ hintText() }}
    </div>
  }

  @if (sheetState() === 'collapsed') {
    <div class="collapsed-bar" aria-live="polite">Waiting for your response...</div>
  }

  <div class="portal-container"
       [class.portal-container--disabled]="isBeat1()"
       [class.portal-container--hidden]="sheetState() === 'collapsed'">
    <ng-template cdkPortalOutlet></ng-template>
  </div>

  @if (isSending()) {
    <div class="sending-indicator" aria-live="polite">Sending...</div>
  }
</div>
