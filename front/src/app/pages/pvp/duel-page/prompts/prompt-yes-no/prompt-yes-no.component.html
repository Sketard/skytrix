<div class="yes-no-container">
  <div class="buttons">
    <button class="btn btn--secondary"
            (click)="selectSecondary()"
            [disabled]="answered"
            type="button">
      {{ secondaryLabel }}
    </button>
    <button class="btn btn--primary prompt-confirm-btn"
            (click)="selectPrimary()"
            [disabled]="answered"
            type="button">
      {{ primaryLabel }}
    </button>
  </div>
</div>
