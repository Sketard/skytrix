@if (promptData?.type === 'SELECT_OPTION' && revealedCards.length > 0) {
  <div class="revealed-cards">
    <div class="revealed-cards__label">Revealed cards</div>
    <div class="revealed-cards__list">
      @for (card of revealedCards; track card.cardCode + '-' + card.sequence) {
        <img class="revealed-cards__img"
             [src]="getCardImageUrl(card.cardCode)"
             [title]="card.name"
             alt="{{ card.name }}" />
      }
    </div>
  </div>
}
<div class="option-list" role="group" aria-label="Options">
  @for (opt of options; track opt.index) {
    <button mat-button
            class="option-item"
            [class.option-item--selected]="selectedIndex() === opt.index"
            (click)="selectOption(opt.index)"
            [disabled]="answered"
            [attr.aria-pressed]="selectedIndex() === opt.index"
            type="button">
      @if (opt.icon) {
        <span class="option-icon">{{ opt.icon }}</span>
      }
      <span class="option-label">{{ opt.label }}</span>
    </button>
  }
</div>

<div class="actions">
  <button class="btn btn--primary prompt-confirm-btn"
          (click)="confirm()"
          [disabled]="selectedIndex() === null || answered"
          type="button">
    Confirm
  </button>
</div>
