<div class="card-strip scrollbar-visible">
  @for (card of cards; track $index) {
    <button class="card-slot"
            [class.card-slot--assigned]="getRank($index) !== null"
            [class.card-slot--last]="isLastAssigned($index)"
            (click)="toggleCard($index)"
            [disabled]="answered && !readOnly"
            type="button"
            [attr.aria-label]="card.name">
      <img class="card-img"
           [src]="getCardImageUrl(card)"
           alt=""
           loading="lazy" />
      @if (getRank($index); as rank) {
        <span class="card-slot__rank">{{ rank }}</span>
      }
    </button>
  }
</div>

<div class="actions">
  @if (orderedIndices().length > 0) {
    <button class="btn btn--secondary"
            (click)="reset()"
            [disabled]="answered"
            type="button">
      {{ 'simulator.reset' | translate }}
    </button>
  }
  <button class="btn btn--primary prompt-confirm-btn"
          (click)="confirm()"
          [disabled]="!isComplete || answered"
          type="button">
    {{ 'common.confirm' | translate }}
  </button>
</div>
