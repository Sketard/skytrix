<div class="replay-cheat-sheet__panel">
  <header class="replay-cheat-sheet__header">
    <h2 class="replay-cheat-sheet__title text-gold-gradient">
      <mat-icon aria-hidden="true" class="replay-cheat-sheet__title-icon">keyboard</mat-icon>
      <span>{{ 'replay.viewer.cheatSheet.title' | translate }}</span>
    </h2>
    <button
      type="button"
      class="icon-btn icon-btn--md"
      [attr.aria-label]="'common.close' | translate"
      (click)="close.emit()">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <div class="replay-cheat-sheet__body">
    @for (section of sections; track section.titleKey) {
      <section class="cheat-section">
        <h3 class="cheat-section-title">
          {{ section.titleKey | translate }}
        </h3>
        <div class="cheat-list">
          @for (item of section.items; track item.labelKey) {
            <div class="cheat-item">
              <span class="cheat-item-label">{{ item.labelKey | translate }}</span>
              <div class="cheat-item-keys">
                @for (k of item.keys; track $index) {
                  <kbd class="cheat-key">{{ k }}</kbd>
                }
              </div>
            </div>
          }
        </div>
      </section>
    }
  </div>
</div>
