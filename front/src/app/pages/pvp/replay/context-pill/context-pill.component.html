<span class="pill pill--gold pill--sm context-pill__turn">{{ turnLabel() }}</span>
@if (hasPosition()) {
  <span class="text-eyebrow context-pill__position">{{ position() }}</span>
}
@if (hasPhase()) {
  <span class="pill pill--cyan pill--xs context-pill__phase">{{ phase() }}</span>
}
@if (hasEvent()) {
  <span class="text-eyebrow context-pill__event">{{ eventLabel() }}</span>
}
