<app-pill variant="gold" size="sm" class="context-pill__turn">{{ turnLabel() }}</app-pill>
@if (hasPhase()) {
  <app-pill variant="neutral" size="xs" class="context-pill__phase">
    <span class="context-pill__phase-bolt" aria-hidden="true">⚡</span>
    {{ phase() }}
  </app-pill>
}
@if (hasEvent()) {
  <span class="text-eyebrow context-pill__event">{{ eventLabel() }}</span>
}
