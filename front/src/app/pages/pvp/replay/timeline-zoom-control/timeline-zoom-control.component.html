<span class="text-eyebrow timeline-zoom-control__hint">
  {{ 'replay.viewer.zoom.label' | translate }}
</span>
@for (lvl of levels; track lvl) {
  <button
    type="button"
    role="radio"
    class="pill pill--xs"
    [class.pill--gold]="lvl === level()"
    [class.pill--neutral]="lvl !== level()"
    [attr.aria-checked]="lvl === level() ? 'true' : 'false'"
    [attr.aria-label]="'replay.viewer.zoom.level' | translate: { n: lvl }"
    (click)="onSelect(lvl)">
    {{ lvl }}×
  </button>
}
