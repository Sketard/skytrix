<div class="transport-bar">

  <!-- LEFT: context (D9) -->
  <div class="transport-bar__context">
    <app-context-pill
      [turnLabel]="turnLabel()"
      [position]="playerPositionLabel()"
      [phase]="phaseLabel()"
      [eventLabel]="eventLabel()" />
  </div>

  <!-- CENTER: transport controls -->
  <div class="transport-bar__controls" role="group" [attr.aria-label]="'replay.viewer.cheatSheet.section.playback' | translate">
    <button
      type="button"
      class="icon-btn icon-btn--md transport-bar__step"
      [attr.aria-label]="'replay.transport.skipStart' | translate"
      [title]="'replay.transport.skipStart' | translate"
      (click)="skipStart.emit()">
      ⏮
    </button>
    <button
      type="button"
      class="icon-btn icon-btn--md transport-bar__step"
      [attr.aria-label]="'replay.transport.stepBack' | translate"
      [title]="'replay.transport.stepBack' | translate"
      (click)="stepBack.emit()">
      ◀
    </button>
    <button
      type="button"
      class="icon-btn icon-btn--lg icon-btn--round transport-bar__play btn--cta-shimmer"
      [attr.aria-label]="playAriaKey() | translate"
      [title]="playAriaKey() | translate"
      [disabled]="atEnd() && !isPlaying()"
      (click)="playPause.emit()">
      {{ playIcon() }}
    </button>
    <button
      type="button"
      class="icon-btn icon-btn--md transport-bar__step"
      [attr.aria-label]="'replay.transport.stepForward' | translate"
      [title]="'replay.transport.stepForward' | translate"
      (click)="stepForward.emit()">
      ▶
    </button>
    <button
      type="button"
      class="icon-btn icon-btn--md transport-bar__step"
      [attr.aria-label]="'replay.transport.skipEnd' | translate"
      [title]="'replay.transport.skipEnd' | translate"
      (click)="skipEnd.emit()">
      ⏭
    </button>
  </div>

  <!-- RIGHT: options -->
  <div class="transport-bar__options" role="group">
    <app-timeline-zoom-control
      [level]="zoomLevel()"
      (levelChange)="zoomLevelChange.emit($event)" />

    <button
      type="button"
      class="icon-btn icon-btn--md transport-bar__toggle"
      [class.icon-btn--active]="animationsEnabled()"
      [attr.aria-label]="animationsAriaKey() | translate"
      [title]="animationsAriaKey() | translate"
      (click)="toggleAnimations.emit()">
      ✦
    </button>
    <button
      type="button"
      class="icon-btn icon-btn--md transport-bar__toggle"
      [class.icon-btn--active]="promptMode() === 'decision'"
      [attr.aria-label]="promptAriaKey() | translate"
      [title]="promptAriaKey() | translate"
      (click)="togglePromptMode.emit()">
      💬
    </button>
    <button
      type="button"
      class="btn btn--ghost btn--sm btn--icon-leading transport-bar__perspective"
      [attr.aria-label]="perspectiveAriaKey() | translate"
      [title]="perspectiveAriaKey() | translate"
      (click)="togglePerspective.emit()">
      <span aria-hidden="true">P{{ perspectiveIndex() + 1 }}</span>
      @if (perspectiveName()) {
        <span class="transport-bar__perspective-name">{{ perspectiveName() }}</span>
      }
      <span aria-hidden="true">⇄</span>
    </button>
    <button
      type="button"
      class="btn btn--ghost btn--sm btn--icon-leading transport-bar__fork"
      [attr.aria-label]="'replay.transport.fork' | translate"
      [title]="'replay.transport.fork' | translate"
      [disabled]="forking()"
      (click)="fork.emit()">
      <span aria-hidden="true">⑂</span>
      <span class="transport-bar__fork-label">{{ 'replay.transport.fork' | translate }}</span>
    </button>
    <button
      type="button"
      class="icon-btn icon-btn--md transport-bar__cheat"
      [attr.aria-label]="'replay.viewer.cheatSheet.help' | translate"
      [title]="'replay.viewer.cheatSheet.help' | translate"
      (click)="openCheatSheet.emit()">
      ⌨
    </button>

    <!-- Mobile-only ⋯ More button — collapses toggles + fork + perspective. -->
    <button
      type="button"
      class="icon-btn icon-btn--lg transport-bar__more"
      [class.transport-bar__more--has-non-default]="hasNonDefaultOption()"
      [attr.aria-label]="'replay.viewer.bottomSheet.options.title' | translate"
      (click)="openMoreOptions.emit()">
      ⋯
    </button>
  </div>

</div>
