<div class="transport-bar">

  <!-- LEFT: context (D9) -->
  <div class="transport-bar__context">
    <app-context-pill
      [turnLabel]="turnLabel()"
      [phase]="phaseLabel()"
      [eventLabel]="eventLabel()" />
  </div>

  <!-- CENTER: transport controls -->
  <div class="transport-bar__controls" role="group" [attr.aria-label]="'replay.viewer.cheatSheet.section.playback' | translate">
    <app-icon-button
      size="lg" variant="framed"
      class="transport-bar__step"
      [ariaLabel]="'replay.transport.skipStart' | translate"
      [title]="'replay.transport.skipStart' | translate"
      (click)="skipStart.emit()">
      <mat-icon>skip_previous</mat-icon>
    </app-icon-button>
    <app-icon-button
      size="lg" variant="framed"
      class="transport-bar__step"
      [ariaLabel]="'replay.transport.stepBack' | translate"
      [title]="'replay.transport.stepBack' | translate"
      (click)="stepBack.emit()">
      <mat-icon>arrow_left</mat-icon>
    </app-icon-button>
    <app-icon-button
      size="xl" variant="primary" round
      class="transport-bar__play"
      [ariaLabel]="playAriaKey() | translate"
      [title]="playAriaKey() | translate"
      [disabled]="atEnd() && !isPlaying()"
      (click)="playPause.emit()">
      <mat-icon>{{ playIcon() }}</mat-icon>
    </app-icon-button>
    <app-icon-button
      size="lg" variant="framed"
      class="transport-bar__step"
      [ariaLabel]="'replay.transport.stepForward' | translate"
      [title]="'replay.transport.stepForward' | translate"
      (click)="stepForward.emit()">
      <mat-icon>arrow_right</mat-icon>
    </app-icon-button>
    <app-icon-button
      size="lg" variant="framed"
      class="transport-bar__step"
      [ariaLabel]="'replay.transport.skipEnd' | translate"
      [title]="'replay.transport.skipEnd' | translate"
      (click)="skipEnd.emit()">
      <mat-icon>skip_next</mat-icon>
    </app-icon-button>
  </div>

  <!-- RIGHT: options -->
  <div class="transport-bar__options" role="group">
    <app-timeline-zoom-control
      [level]="zoomLevel()"
      (levelChange)="zoomLevelChange.emit($event)" />

    <button
      type="button"
      class="transport-bar__toggle"
      [class.is-active]="animationsEnabled()"
      [attr.aria-label]="animationsAriaKey() | translate"
      [title]="animationsAriaKey() | translate"
      (click)="toggleAnimations.emit()">
      <mat-icon aria-hidden="true">animation</mat-icon>
      <span class="transport-bar__toggle-label">{{ 'replay.transport.animShort' | translate }}</span>
    </button>
    <button
      type="button"
      class="transport-bar__toggle"
      [class.is-active]="promptMode() === 'decision'"
      [attr.aria-label]="promptAriaKey() | translate"
      [title]="promptAriaKey() | translate"
      (click)="togglePromptMode.emit()">
      <mat-icon aria-hidden="true">message</mat-icon>
      <span class="transport-bar__toggle-label">{{ 'replay.transport.decisionsShort' | translate }}</span>
    </button>
    <button
      type="button"
      class="transport-bar__perspective"
      [attr.aria-label]="perspectiveAriaKey() | translate"
      [title]="perspectiveAriaKey() | translate"
      (click)="togglePerspective.emit()">
      <span class="transport-bar__perspective-avatar"
            [class.transport-bar__perspective-avatar--p1]="perspectiveIndex() === 0"
            [class.transport-bar__perspective-avatar--p2]="perspectiveIndex() === 1"
            aria-hidden="true">
        P{{ perspectiveIndex() + 1 }}
      </span>
      <mat-icon aria-hidden="true">swap_horiz</mat-icon>
    </button>
    <app-button
      variant="secondary" size="sm" cta
      class="transport-bar__fork"
      [ariaLabel]="'replay.transport.fork' | translate"
      [title]="'replay.transport.fork' | translate"
      [disabled]="forking()"
      (click)="fork.emit()">
      <mat-icon aria-hidden="true">fork_right</mat-icon>
      <span class="transport-bar__fork-label">{{ 'replay.transport.forkShort' | translate }}</span>
    </app-button>
    <app-icon-button
      size="md"
      class="transport-bar__cheat"
      [ariaLabel]="'replay.viewer.cheatSheet.help' | translate"
      [title]="'replay.viewer.cheatSheet.help' | translate"
      (click)="openCheatSheet.emit()">
      <mat-icon>keyboard</mat-icon>
    </app-icon-button>

    <!-- Mobile-only ⋯ More button — collapses toggles + fork + perspective. -->
    <app-icon-button
      size="lg"
      class="transport-bar__more"
      [class.transport-bar__more--has-non-default]="hasNonDefaultOption()"
      [ariaLabel]="'replay.viewer.bottomSheet.options.title' | translate"
      (click)="openMoreOptions.emit()">
      <mat-icon>more_horiz</mat-icon>
    </app-icon-button>
  </div>

</div>
