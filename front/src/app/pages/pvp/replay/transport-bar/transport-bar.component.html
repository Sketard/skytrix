<div class="transport-bar">
  @if (positionLabel(); as label) {
    <span class="position-label">{{ label }}</span>
  }

  <button mat-icon-button
          [attr.aria-label]="'replay.transport.skipStart' | translate"
          [matTooltip]="'replay.transport.skipStart' | translate"
          (click)="skipStart.emit()">
    <mat-icon>skip_previous</mat-icon>
  </button>

  <button mat-icon-button
          [attr.aria-label]="'replay.transport.stepBack' | translate"
          [matTooltip]="'replay.transport.stepBack' | translate"
          (click)="stepBack.emit()">
    <mat-icon>arrow_left</mat-icon>
  </button>

  <button mat-icon-button
          [attr.aria-label]="(isPlaying() ? 'replay.transport.pause' : 'replay.transport.play') | translate"
          [matTooltip]="(isPlaying() ? 'replay.transport.pause' : 'replay.transport.play') | translate"
          (click)="playPause.emit()">
    <mat-icon>{{ isPlaying() ? 'pause' : 'play_arrow' }}</mat-icon>
  </button>

  <button mat-icon-button
          [attr.aria-label]="'replay.transport.stepForward' | translate"
          [matTooltip]="'replay.transport.stepForward' | translate"
          (click)="stepForward.emit()">
    <mat-icon>arrow_right</mat-icon>
  </button>

  <button mat-icon-button
          [attr.aria-label]="'replay.transport.skipEnd' | translate"
          [matTooltip]="'replay.transport.skipEnd' | translate"
          (click)="skipEnd.emit()">
    <mat-icon>skip_next</mat-icon>
  </button>

  <button mat-icon-button
          [attr.aria-label]="'replay.transport.fork' | translate"
          [matTooltip]="'replay.transport.fork' | translate"
          [disabled]="forking()"
          (click)="fork.emit()">
    @if (forking()) {
      <mat-spinner diameter="18"></mat-spinner>
    } @else {
      <mat-icon>fork_right</mat-icon>
    }
  </button>

  <span class="separator"></span>

  <button mat-icon-button
          class="toggle-btn"
          [attr.aria-label]="(animationsEnabled() ? 'replay.transport.disableAnimations' : 'replay.transport.enableAnimations') | translate"
          [matTooltip]="(animationsEnabled() ? 'replay.transport.disableAnimations' : 'replay.transport.enableAnimations') | translate"
          [class.active]="animationsEnabled()"
          [class.inactive]="!animationsEnabled()"
          (click)="toggleAnimations.emit()">
    <mat-icon>{{ animationsEnabled() ? 'animation' : 'motion_photos_off' }}</mat-icon>
  </button>

  <button mat-icon-button
          class="toggle-btn"
          [attr.aria-label]="(promptMode() === 'decision' ? 'replay.transport.skipDecisions' : 'replay.transport.showDecisions') | translate"
          [matTooltip]="(promptMode() === 'decision' ? 'replay.transport.skipDecisions' : 'replay.transport.showDecisions') | translate"
          [class.active]="promptMode() === 'decision'"
          [class.inactive]="promptMode() !== 'decision'"
          (click)="togglePromptMode.emit()">
    <mat-icon>{{ promptMode() === 'decision' ? 'message' : 'speaker_notes_off' }}</mat-icon>
  </button>

  <button mat-icon-button
          class="perspective-btn"
          [attr.aria-label]="(perspectiveIndex() === 0 ? 'replay.transport.viewAsPlayer2' : 'replay.transport.viewAsPlayer1') | translate"
          [matTooltip]="(perspectiveIndex() === 0 ? 'replay.transport.viewAsPlayer2' : 'replay.transport.viewAsPlayer1') | translate"
          (click)="togglePerspective.emit()">
    <span class="player-label">{{ perspectiveIndex() === 0 ? 'P1' : 'P2' }}</span>
  </button>
</div>
