<div class="timeline-stepper__row">
  <app-icon-button
    size="lg" variant="framed"
    class="timeline-stepper__nav"
    [ariaLabel]="'replay.viewer.stepper.prevTurn' | translate"
    [disabled]="!canStepPrev()"
    (click)="onPrev()">
    <mat-icon>chevron_left</mat-icon>
  </app-icon-button>

  <!-- Picker affordance — pill is a "tap to open turn picker" button. The turn
       label (`T3 / 11`) lives in the transport-bar context-pill directly below,
       so repeating it here was redundant (Axel 2026-05-16). The dot-progress
       gives an at-a-glance position-in-turn visualisation that the transport
       pill doesn't cover; the chevron is the discoverability hint. -->
  <button
    type="button"
    class="timeline-stepper__pill"
    [attr.aria-label]="'replay.viewer.stepper.openPicker' | translate"
    (click)="onPickerOpen()">
    <mat-icon aria-hidden="true" class="timeline-stepper__pill-icon">grid_view</mat-icon>
    <span class="timeline-stepper__dots" aria-hidden="true">
      @for (active of dotState(); track $index) {
        <span class="timeline-stepper__dot" [class.is-active]="active"></span>
      }
    </span>
    <mat-icon aria-hidden="true" class="timeline-stepper__chevron">expand_more</mat-icon>
  </button>

  <app-icon-button
    size="lg" variant="framed"
    class="timeline-stepper__nav"
    [ariaLabel]="'replay.viewer.stepper.nextTurn' | translate"
    [disabled]="!canStepNext()"
    (click)="onNext()">
    <mat-icon>chevron_right</mat-icon>
  </app-icon-button>
</div>
