<div class="card-search-page">

  <div class="screen-bg" aria-hidden="true">
    <div class="screen-bg-grid"></div>
    <div class="screen-bg-glow screen-bg-glow--gold"></div>
    <div class="screen-bg-glow screen-bg-glow--cyan"></div>
  </div>

  <!-- TOP HEADER (full width) -->
  <header class="page-header card-search-page__header">
    <div class="page-header__title-group">
      <app-icon-wrap palette="cyan" icon="search"></app-icon-wrap>
      <div class="page-header__text">
        <h1 class="page-header__title card-search-page__title">{{ 'cardSearchPage.title' | translate }}</h1>
        <span class="page-header__subtitle">{{ 'cardSearchPage.subtitle' | translate }}</span>
      </div>
    </div>

    <div class="card-search-page__bar">
      <search-bar
        [form]="cardSearchService.filterForm.controls.name"
        [searchService]="cardSearchService"
        [showFilters]="false">
      </search-bar>

      <div class="card-search-page__display-toggle">
        <div class="card-search-page__view-group" role="radiogroup" [attr.aria-label]="'cardSearcher.grid' | translate">
          <button type="button"
            class="btn btn--ghost btn--sm card-search-page__view-btn"
            [class.card-search-page__view-btn--active]="cardSearchService.displayMode() === displayType.GRID"
            role="radio"
            [attr.aria-checked]="cardSearchService.displayMode() === displayType.GRID"
            [matTooltip]="'cardSearcher.grid' | translate"
            [attr.aria-label]="'cardSearcher.grid' | translate"
            (click)="setDisplayMode(displayType.GRID)">
            <mat-icon>view_module</mat-icon>
          </button>
          <button type="button"
            class="btn btn--ghost btn--sm card-search-page__view-btn"
            [class.card-search-page__view-btn--active]="cardSearchService.displayMode() === displayType.LIST"
            role="radio"
            [attr.aria-checked]="cardSearchService.displayMode() === displayType.LIST"
            [matTooltip]="'cardSearcher.list' | translate"
            [attr.aria-label]="'cardSearcher.list' | translate"
            (click)="setDisplayMode(displayType.LIST)">
            <mat-icon>view_headline</mat-icon>
          </button>
        </div>

        <button type="button"
          class="btn btn--ghost btn--sm card-search-page__favorite"
          [class.card-search-page__favorite--active]="cardSearchService.favoriteFilter()"
          (click)="toggleFavoriteFilter()"
          [matTooltip]="'cardSearcher.favorites' | translate"
          [attr.aria-label]="'cardSearcher.favorites' | translate">
          <mat-icon>{{ cardSearchService.favoriteFilter() ? 'star' : 'star_border' }}</mat-icon>
        </button>
      </div>
    </div>
  </header>

  <!-- DESKTOP: 2-cols layout (sidebar filters + results) -->
  <div class="card-search-page__body">
    <aside class="card-search-page__sidebar">
      <app-card-filters [searchService]="cardSearchService"></app-card-filters>
    </aside>

    <main class="card-search-page__main">
      <app-active-filters-bar [searchService]="cardSearchService"></app-active-filters-bar>

      <div class="card-search-page__count" aria-live="polite" aria-atomic="true">
        {{ 'cardFilters.resultsCount' | translate:{ count: resultsLabel() } }}
      </div>

      <div class="card-search-page__results">
        <card-list
          [displayMode]="cardSearchService.displayMode()"
          [searchService]="cardSearchService"
          [deckBuildMode]="false"
          (cardClicked)="onCardClicked($event)">
        </card-list>
      </div>
    </main>
  </div>

  <!-- MOBILE FAB: open the filters bottom-sheet -->
  <button mat-icon-button class="card-search-page__fab"
    [attr.aria-label]="'deckBuilder.searchCard' | translate"
    (click)="toggleSearchPanel()">
    <mat-icon>tune</mat-icon>
  </button>

  <!-- MOBILE BOTTOM-SHEET: filters -->
  <app-bottom-sheet
    [opened]="searchPanelOpened() && isMobilePortrait()"
    [ariaLabel]="'Panneau de recherche de cartes'"
    [requestedSnap]="filtersRequestedSnap()"
    (closed)="searchPanelOpened.set(false)">
    <div class="card-search-page__sheet">
      <app-card-filters [searchService]="cardSearchService"></app-card-filters>
    </div>
  </app-bottom-sheet>

  <!-- LANDSCAPE-SPLIT external filters bottom-sheet (legacy compact mode) -->
  <app-bottom-sheet
    class="card-search-page__external-filters"
    [opened]="externalFiltersOpened()"
    [ariaLabel]="'Panneau de filtres'"
    (closed)="externalFiltersOpened.set(false)">
    <app-card-filters [searchService]="cardSearchService"></app-card-filters>
  </app-bottom-sheet>

  <app-card-inspector
    [card]="selectedCardForInspector()"
    mode="click"
    [ownedCount]="selectedCardOwnedCount()"
    [isFavorite]="selectedCardDetail()?.favorite ?? false"
    (ownedCountChange)="onOwnedCountChange($event)"
    (favoriteChange)="onFavoriteChange()"
    (dismissed)="dismissInspector()">
  </app-card-inspector>
</div>
