<div class="card"
     [class.def-position]="isDefPosition()"
     (click)="clicked.emit()">
  @if (!imageLoaded()) {
    <div class="card-skeleton" aria-hidden="true"></div>
  }
  @if (faceDown()) {
    <img src="assets/images/card_back.jpg"
         alt=""
         class="card-image"
         [class.card-image--loaded]="imageLoaded()"
         width="59" height="86"
         (load)="onImageLoad()">
  } @else {
    <img [src]="card().imageUrl"
         alt=""
         [attr.aria-label]="card() | cardName"
         (load)="onImageLoad()"
         (error)="onImageError($event)"
         class="card-image"
         [class.card-image--loaded]="imageLoaded()"
         width="59" height="86">
  }
</div>

@if (showOverlayMaterials() && materialPeekSlots().length > 0) {
  <div class="material-peek-borders">
    @for (material of materialPeekSlots(); track $index) {
      <div class="material-border"
           [style.bottom.px]="-(($index + 1) * 3)"
           [style.left.px]="($index + 1) * 1">
      </div>
    }
  </div>
}
