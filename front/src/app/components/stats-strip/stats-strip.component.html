<section class="stats-strip"
         role="list"
         [attr.aria-label]="ariaLabelKey() ? (ariaLabelKey()! | translate) : null">
  @for (stat of stats(); track stat.labelKey) {
    <div class="stats-strip__item"
         role="listitem"
         [class.stats-strip__item--accent-gold]="stat.surfaceAccent === 'gold'"
         [class.stats-strip__item--accent-cyan]="stat.surfaceAccent === 'cyan'"
         [class.stats-strip__item--accent-neutral]="!stat.surfaceAccent || stat.surfaceAccent === 'neutral'">
      @if (stat.icon) {
        <span class="stats-strip__icon"
              [class.stats-strip__icon--total]="stat.iconVariant === 'total'"
              [class.stats-strip__icon--win]="stat.iconVariant === 'win'"
              [class.stats-strip__icon--loss]="stat.iconVariant === 'loss'"
              [class.stats-strip__icon--winrate]="stat.iconVariant === 'winrate'"
              [class.stats-strip__icon--neutral]="!stat.iconVariant || stat.iconVariant === 'neutral'">
          <mat-icon>{{ stat.icon }}</mat-icon>
        </span>
      }
      <div class="stats-strip__content">
        <span class="stats-strip__value"
              [class.stats-strip__value--gold]="stat.valueVariant === 'gold'"
              [class.stats-strip__value--muted]="stat.valueVariant === 'muted'">
          {{ stat.value }}
        </span>
        <span class="stats-strip__label">{{ stat.labelKey | translate }}</span>
      </div>
    </div>
  }
</section>
