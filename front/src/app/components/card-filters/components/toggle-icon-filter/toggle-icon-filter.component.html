<div class="toggleIconFilter">
  <div class="toggleIconFilter-name">{{ inputLabel() | translate }}</div>
  <div class="attr-row" role="radiogroup" [attr.aria-label]="inputLabel() | translate">
    @for (toggleIcon of toggleIcons(); track toggleIcon.value) {
      <button
        type="button"
        class="attr-icon"
        [class.attr-icon--active]="isActive(toggleIcon.value)"
        role="radio"
        [attr.aria-checked]="isActive(toggleIcon.value)"
        [title]="'card_attribute.' + toggleIcon.title | translate"
        [attr.aria-label]="'card_attribute.' + toggleIcon.title | translate"
        (click)="toggle(toggleIcon.value)">
        <img [src]="toggleIcon.icon" [alt]="" />
      </button>
    }
  </div>
</div>
