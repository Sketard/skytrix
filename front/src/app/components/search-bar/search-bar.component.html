<div class="search-bar">
  <mat-icon class="search-bar__icon" aria-hidden="true">search</mat-icon>
  <input
    type="search"
    class="search-bar__input"
    [formControl]="form()"
    [placeholder]="'search.placeholder' | translate" />
  @if (form().value) {
    <button
      type="button"
      class="search-bar__clear"
      [attr.aria-label]="'search.clear' | translate"
      (click)="clearFormControl()">
      <mat-icon aria-hidden="true">close</mat-icon>
    </button>
  }
  @if (showFilters()) {
    @if ((numberOfActiveFilters$ | async); as numberOfActiveFilters) {
      <button
        type="button"
        class="search-bar__clear search-bar__clear--filters"
        [attr.aria-label]="'cardFilters.clearAll' | translate"
        (click)="clearFilters()">
        <mat-icon aria-hidden="true">backspace</mat-icon>
      </button>
    }
    <button
      type="button"
      class="search-bar__filters-btn"
      [attr.aria-label]="'deckBuilder.actions' | translate"
      (click)="openFilters()">
      <mat-icon aria-hidden="true">tune</mat-icon>
      @if ((numberOfActiveFilters$ | async); as numberOfActiveFilters) {
        <span class="search-bar__badge">{{ numberOfActiveFilters }}</span>
      }
    </button>
  }
</div>
