<div class="empty-state" [ngClass]="variantClass()">
  @if (icon()) {
    <mat-icon class="empty-state__icon">{{ icon() }}</mat-icon>
  }
  <p class="empty-state__title">{{ titleKey() | translate }}</p>
  @if (descKey()) {
    <p class="empty-state__desc">{{ descKey()! | translate }}</p>
  }
  @if (ctaLink() && ctaLabelKey() && !ctaDisabled()) {
    <a [class]="ctaButtonClass()" [routerLink]="ctaLink()">
      @if (ctaIcon()) {
        <mat-icon>{{ ctaIcon() }}</mat-icon>
      }
      {{ ctaLabelKey()! | translate }}
    </a>
  } @else if (ctaLabelKey()) {
    <button type="button" [class]="ctaButtonClass()" [disabled]="ctaDisabled()" (click)="ctaAction.emit()">
      @if (ctaIcon()) {
        <mat-icon>{{ ctaIcon() }}</mat-icon>
      }
      {{ ctaLabelKey()! | translate }}
    </button>
  }
</div>
