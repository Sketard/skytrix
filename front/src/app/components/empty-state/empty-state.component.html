<div class="empty-state">
  <p class="empty-state__title">{{ message() }}</p>
  @if (ctaLink()) {
    <a class="btn btn--primary btn--lg btn--cta" [routerLink]="ctaLink()">{{ ctaLabel() }}</a>
  } @else if (ctaLabel()) {
    <button class="btn btn--primary btn--lg btn--cta" (click)="ctaAction.emit()">{{ ctaLabel() }}</button>
  }
</div>
