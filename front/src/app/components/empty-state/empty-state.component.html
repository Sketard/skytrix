<div class="empty-state" [class.empty-state--welcome]="variant() === 'welcome'">
  @if (variant() === 'welcome' && icon()) {
    <mat-icon class="empty-state__icon">{{ icon() }}</mat-icon>
  }
  <p class="empty-state__title">{{ message() }}</p>
  @if (subtitle()) {
    <p class="empty-state__subtitle">{{ subtitle() }}</p>
  }
  @if (ctaLink()) {
    <a class="btn btn--primary btn--lg btn--cta" [routerLink]="ctaLink()">{{ ctaLabel() }}</a>
  } @else if (ctaLabel()) {
    <button class="btn btn--primary btn--lg btn--cta" (click)="ctaAction.emit()">{{ ctaLabel() }}</button>
  }
</div>
