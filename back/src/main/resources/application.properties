spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:postgresql://localhost:5432/skytrix
spring.jpa.properties.hibernate.default_schema="public"
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:root}
spring.flyway.enabled=true
spring.flyway.out-of-order=true
spring.flyway.validateOnMigrate=false
spring.flyway.baselineOnMigrate=true
server.servlet.context-path=/api
# Actuator — health only, on separate port (not exposed via /api)
management.server.port=8081
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
document.folder.image.small=./images/small/
document.folder.image.big=./images/big/
# JWT config
jwt.secret=${JWT_SECRET:NyfG9bT0gZtOnVlnuZ5UQwyEuN5HEZcm23WxEIZskjPSqxIvNG275FLvo46Ovmbq}
jwt.validity-period=60000000
jwt.refresh-validity-period=86400000
# Duel server (HTTP, server-to-server)
duel-server.url=${DUEL_SERVER_URL:http://localhost:3001}
duel-server.internal-key=${DUEL_SERVER_INTERNAL_KEY:dev-internal-key}
