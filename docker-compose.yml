x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:

  # Base de données PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: skytrix-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - skytrix-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot
  back:
    build: ./back
    container_name: skytrix-back
    restart: unless-stopped
    logging: *default-logging
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DUEL_SERVER_URL: http://duel-server:3001
      DUEL_SERVER_INTERNAL_KEY: ${INTERNAL_API_KEY}
    volumes:
      - images_data:/app/images
      - ./logs/back:/app/logs
    networks:
      - skytrix-internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Duel Server (WebSocket)
  duel-server:
    build: ./duel-server
    container_name: skytrix-duel-server
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./duel-server/data:/app/data:ro
    environment:
      PORT: 3001
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - skytrix-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Angular servi par Nginx
  front:
    build: ./front
    container_name: skytrix-front
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${TLS_CERT_DIR:-./certs}:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - skytrix-internal
    depends_on:
      - back

volumes:
  postgres_data:
  images_data:

networks:
  skytrix-internal:
