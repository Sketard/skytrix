x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-security: &default-security
  security_opt:
    - no-new-privileges:true
  pids_limit: 100

services:

  # Base de données PostgreSQL — réseau isolé, inaccessible depuis front/duel-server
  db:
    image: postgres:16-alpine
    container_name: skytrix-db
    restart: unless-stopped
    logging: *default-logging
    <<: *default-security
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - skytrix-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

  # Backend Spring Boot
  back:
    build: ./back
    container_name: skytrix-back
    restart: unless-stopped
    logging: *default-logging
    <<: *default-security
    pids_limit: 300
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DUEL_SERVER_URL: http://duel-server:3001
      DUEL_SERVER_INTERNAL_KEY: ${INTERNAL_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      JAVA_OPTS: "-XX:+UseG1GC -Xmx512m"
    volumes:
      - images_data:/app/images
      - ./logs/back:/app/logs
    networks:
      - skytrix-internal
      - skytrix-data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 768m
    cpus: 1.0

  # Duel Server (WebSocket)
  duel-server:
    build:
      context: .
      dockerfile: duel-server/Dockerfile
    container_name: skytrix-duel-server
    restart: unless-stopped
    logging: *default-logging
    <<: *default-security
    volumes:
      - duel_data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3001
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - skytrix-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    cpus: 0.5

  # Frontend Angular servi par Nginx
  front:
    build: ./front
    container_name: skytrix-front
    restart: unless-stopped
    logging: *default-logging
    <<: *default-security
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${TLS_CERT_DIR:-./certs}:/etc/nginx/certs:ro
      - ./certbot-webroot:/var/www/certbot:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - skytrix-internal
    depends_on:
      - back
      - duel-server
    mem_limit: 64m
    cpus: 0.25

  # Certbot — renouvellement automatique Let's Encrypt (toutes les 12h)
  # Émission initiale : docker compose run --rm certbot certonly \
  #   --webroot -w /var/www/certbot -d ${DOMAIN} \
  #   --email your@email.com --agree-tos --no-eff-email
  # Puis définir TLS_CERT_DIR=/etc/letsencrypt/live/${DOMAIN} dans .env
  certbot:
    image: certbot/certbot:latest
    container_name: skytrix-certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  images_data:
  duel_data:

networks:
  # Réseau partagé : front ↔ back ↔ duel-server
  skytrix-internal:
    driver: bridge
  # Réseau isolé : back ↔ db uniquement (internal=true bloque tout trafic externe)
  skytrix-data:
    driver: bridge
    internal: true
