# Deploy to /etc/logrotate.d/skytrix-nginx on the VPS
# Rotates nginx logs mounted from docker-compose (./logs/nginx/)

/home/ubuntu/skytrix/logs/nginx/*.log {
    su ubuntu ubuntu
    size 25M
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    sharedscripts
    postrotate
        docker exec skytrix-front nginx -s reopen 2>/dev/null || true
    endscript
}
